const KEYS = ["kcal","fat","sat","carbs","sugars","fibre","protein","salt"];

// singleItems (Salads) werden NIE multipliziert: Footlong = ×2 für alles AUSSER Salads
function sumN(items, mult, singleItems) {
  const b = {}; KEYS.forEach(k => b[k] = 0);
  items.forEach(it => { if(it) KEYS.forEach(k => b[k] += (it[k]||0)*mult); });
  (singleItems||[]).forEach(it => { if(it) KEYS.forEach(k => b[k] += (it[k]||0)); });
  KEYS.forEach(k => b[k] = Math.round(b[k]*10)/10);
  return b;
}

function score(a, t, mode, p) {
  let s = 0;
  if(mode==="macros") {
    if(t.protein>0) s += Math.abs(a.protein-t.protein)/Math.max(t.protein,1)*3;
    if(t.carbs>0) s += Math.abs(a.carbs-t.carbs)/Math.max(t.carbs,1)*2;
    if(t.fat>0) s += Math.abs(a.fat-t.fat)/Math.max(t.fat,1)*2;
  } else {
    if(t.kcal>0) s += Math.abs(a.kcal-t.kcal)/Math.max(t.kcal,1)*4;
    const pr=a.protein*4/Math.max(a.kcal,1), cr=a.carbs*4/Math.max(a.kcal,1), fr=a.fat*9/Math.max(a.kcal,1);
    if(p.hp) s-=pr*2; if(p.lp) s+=pr*1.5;
    if(p.hc) s-=cr*1.5; if(p.lc) s+=cr*2;
    if(p.hf) s-=fr*1.5; if(p.lf) s+=fr*2;
  }
  if(t.fibMin!=null&&a.fibre<t.fibMin) s+=(t.fibMin-a.fibre)*0.5;
  if(t.fibMax!=null&&a.fibre>t.fibMax) s+=(a.fibre-t.fibMax)*0.5;
  if(t.sMin!=null&&a.salt<t.sMin) s+=(t.sMin-a.salt)*0.3;
  if(t.sMax!=null&&a.salt>t.sMax) s+=(a.salt-t.sMax)*0.3;
  return s;
}

// "Kallo Lightly salted low fat corn cakes": fast reine Carb-Quelle, nur in ganzen Stueck essbar (1 Stueck = 7.28 g).
// Naehrwerte pro 100 g: 386 kcal, Fat 1.2, sat 0.3, Carbs 86.0, sugars 0.3, Protein 6.9, Salt 0.2 (KEINE Ballaststoffe).
// Per-Stueck = per-100g × 0.0728. Restaurantsuebergreifender Schalter: der Optimizer haengt 0..N Cakes an JEDES
// Ergebnis, um offene Carbs zu fuellen — aber nur wenn sie den Score verbessern (→ 0, wenn Carbs nicht offen sind).
const CORN_CAKE={name:"Kallo Lightly salted low fat corn cakes",kcal:28.1,fat:0.09,sat:0.02,carbs:6.26,sugars:0.02,fibre:0,protein:0.5,salt:0.01};
const CORN_CAKE_MAX=40; // harte Obergrenze der Stueck-Suche (40 Stueck ≈ 250 g Carbs / ~1124 kcal)
// Cap "max % der Carbs aus Cakes": groesste Stueckzahl, deren Carb-Beitrag <= capPct% des Carb-Ziels bleibt
// (harte Obergrenze → nie ueber capPct; "naechstmoegliche" = naechstkleinere erreichbare Stueckzahl). 0/>=100 = kein Cap.
function cornCapCount(t, capPct){
  if(!(capPct>0)||capPct>=100||!(t.carbs>0)) return CORN_CAKE_MAX;
  return Math.floor((capPct/100)*t.carbs/CORN_CAKE.carbs);
}
// Optimale ganzzahlige Stueckzahl, die den Score gegen das Ziel minimiert. 0 wenn Cakes nichts verbessern.
// NUR im Makro-Modus mit Carb-Ziel: Corn Cakes fuellen einen CARB-Gap, den es nur dort gibt. Im Kalorien-Modus
// (nur kcal-Ziel, keine Carb-Vorgabe) wuerden sie den GANZEN kcal-Gap mit reiner Carb-Quelle fuellen → bis zum
// 40er-Cap eskalieren; das ist sinnlos, daher dort immer 0. capPct = "max % der Carbs aus Cakes" (0 = kein Cap).
function bestCornCakes(n, t, mode, p, capPct){
  if(mode!=="macros"||!(t.carbs>0)) return 0;
  const maxN=Math.min(CORN_CAKE_MAX, cornCapCount(t, capPct||0));
  let bestK=0, bestS=score(n,t,mode,p);
  const cur={}; for(const k of KEYS) cur[k]=n[k]||0;
  for(let k=1;k<=maxN;k++){
    for(const key of KEYS) cur[key]+=CORN_CAKE[key];
    const s=score(cur,t,mode,p);
    if(s<bestS-1e-9){bestS=s;bestK=k;}
  }
  return bestK;
}
// Augmentiert EIN Ergebnis um die optimale Cake-Anzahl: neue nutrition (inkl. Cakes, fuer Karten+Ranking),
// .corn (Stueckzahl), ._base (corn-freie nutrition, fuer Live-Recompute im Detail-Panel) + neuer score.
function withCornCake(r, on, t, mode, p, capPct){
  if(!on) return r;
  const base=r.nutrition;
  const k=bestCornCakes(base, t, mode, p, capPct);
  if(!k) return Object.assign({}, r, {corn:0, _base:base});
  const nn={}; for(const key of KEYS) nn[key]=Math.round(((base[key]||0)+k*CORN_CAKE[key])*10)/10;
  return Object.assign({}, r, {corn:k, _base:base, nutrition:nn, score:score(nn,t,mode,p)});
}
// Augmentiert + re-sortiert nach dem corn-inklusiven Score (sonst zeigt die Default-"Score"-Sortierung die
// PRE-corn-Reihenfolge des Optimizers; Karten waeren nicht nach ihrer echten Qualitaet inkl. Cakes geordnet).
// Bleibt durch das Top-20-Slicing der Optimizer begrenzt, ordnet aber die angezeigten Kandidaten korrekt.
function applyCornCakes(arr, on, t, mode, p, capPct){ return on?arr.map(r=>withCornCake(r,on,t,mode,p,capPct)).sort((a,b)=>a.score-b.score):arr; }

// "Sort by": sortiert die Top-20-Kandidaten des Optimizers nach Accuracy EINER Dimension
// (|Ist − Ziel|, Tie-Breaker: Gesamt-Score). sortBy="score" = unverändert (Optimizer-Reihenfolge).
function sortResults(arr, sortBy, tgts) {
  if(sortBy==="score")return arr;
  const tgt=tgts[sortBy]||0;
  return [...arr].sort((a,b)=>
    Math.abs(a.nutrition[sortBy]-tgt)-Math.abs(b.nutrition[sortBy]-tgt)||a.score-b.score);
}

// ── Screenshot-Import (OCR) ──
// Liest die "Übersicht" eines Makro-Trackers (z.B. YAZIO) aus einem hochgeladenen Screenshot und füllt die
// VERBLEIBENDEN Makros (Total − Gegessen) + die "Übrig"-Kalorien automatisch ein. Alles UNTER der Übersicht
// (Frühstück/Mittagessen … in kcal) wird ignoriert: die Makro-Balken enden auf "g", die Meal-Rows auf "kcal".
// parseMacroScreenshot ist rein (Text → {carbs,protein,fat,kcal}|null) und in tests.js abgesichert.
function parseMacroScreenshot(ocrText) {
  if (ocrText == null || typeof ocrText !== "string") return null;
  const norm = s => String(s).toLowerCase().replace(/ü/g,"u").replace(/ö/g,"o").replace(/ä/g,"a").replace(/ß/g,"ss");
  const stripTh = n => String(n).replace(/[.,](?=\d{3}\b)/g, "");       // 2.267 -> 2267, echte Dezimale (12,4) bleiben
  const toInt = n => { const c = stripTh(n).replace(/[^\d]/g,""); return c==="" ? null : parseInt(c,10); };
  const lines = ocrText.split(/\r?\n/);

  // 1) Makro-Paare. Pass A: "N <sep> M <unit>" — Trenner tolerant (/ | I l ) ], \s matcht \n), Unit klassifiziert.
  //    Erste 3 Paare, deren Unit NICHT kcal/kj/kg ist (Meal-Rows + Gewicht raus) = Carbs, Protein, Fat.
  //    Robust gegen fehlendes/verlesenes "g": die Übersicht-Makros stehen immer oben, kcal-Meal-Rows darunter.
  const ENERGY = u => u === "kcal" || u === "kj" || u === "kg";
  const macros = []; let m;
  const reA = /(\d[\d.,]*)\s*[\/|Il)\]]\s*(\d[\d.,]*)\s*([a-z]{0,4})/gi;
  while ((m = reA.exec(ocrText)) !== null) {
    if (ENERGY((m[3] || "").toLowerCase())) continue;
    const eaten = toInt(m[1]), total = toInt(m[2]);
    if (eaten == null || total == null || total <= 0) continue;
    macros.push({ eaten, total });
    if (macros.length >= 3) break;
  }
  // Pass B (Fallback, falls der Slash ganz verschluckt wurde): "N <leerraum> M g" — durch das "g" verankert.
  if (macros.length < 3) {
    macros.length = 0;
    const reB = /(\d[\d.,]*)\s+(\d[\d.,]*)\s*g(?![a-z])/gi;
    while ((m = reB.exec(ocrText)) !== null) {
      const eaten = toInt(m[1]), total = toInt(m[2]);
      if (eaten == null || total == null || total <= 0) continue;
      macros.push({ eaten, total });
      if (macros.length >= 3) break;
    }
  }
  if (macros.length < 3) return null;
  let carbs   = Math.max(0, macros[0].total - macros[0].eaten);
  let protein = Math.max(0, macros[1].total - macros[1].eaten);
  let fat     = Math.max(0, macros[2].total - macros[2].eaten);
  let computedKcal = carbs*4 + protein*4 + fat*9;

  // 2) "Übrig"-Kalorien — angezeigten Wert bevorzugen (Reihenfolge der Top-Zahlen: Gegessen, Übrig, Verbrannt).
  const isMacroBar = ln => { const mm = /(\d[\d.,]*)\s*[\/|Il)\]]\s*(\d[\d.,]*)\s*([a-z]{0,4})/i.exec(ln); return !!mm && !ENERGY((mm[3] || "").toLowerCase()); };
  const isKcal = ln => /kcal/i.test(ln);
  const numsIn = ln => { const out=[], re=/\d[\d.,]*/g; let mm; while((mm=re.exec(ln))!==null){const v=toInt(mm[0]); if(v!=null)out.push(v);} return out; };
  const hasUbrig = ln => /(ubrig|obrig|\bbrig\b)/.test(norm(ln));

  let posKcal = null;
  for (let i=0;i<lines.length && posKcal==null;i++){                 // Label + Zahl in DERSELBEN Zeile
    if (!hasUbrig(lines[i]) || isMacroBar(lines[i])) continue;
    const nb = numsIn(lines[i]); if (!nb.length) continue;
    // NICHT Math.max: steht der ganze Ring auf EINER Zeile ("1.688 Gegessen 1.112 Übrig 0 Verbrannt"),
    // würde max die GEGESSEN-Zahl (1688) statt Übrig (1112) greifen. Stattdessen die Zahl der Zeile nehmen,
    // die dem Makro-Rest am nächsten liegt (= der Übrig-Wert). Nur bei kaputtem Rest (g->9-Fall, >6000) -> Math.max.
    posKcal = (computedKcal>0 && computedKcal<=6000)
      ? nb.reduce((a,b)=>Math.abs(b-computedKcal)<Math.abs(a-computedKcal)?b:a)
      : Math.max.apply(null, nb);
  }
  if (posKcal==null) for (let j=0;j<lines.length && posKcal==null;j++){  // Zahlen in Nachbarzeile ±1..2 → Index 1 = Übrig
    if (!hasUbrig(lines[j])) continue;
    const cand=[]; for(let d=1;d<=2;d++){ if(j+d<lines.length)cand.push(j+d); if(j-d>=0)cand.push(j-d); }
    for (const ci of cand){ if(posKcal!=null)break; const ln=lines[ci]; if(isMacroBar(ln)||isKcal(ln))continue;
      const ns=numsIn(ln); if(!ns.length)continue; posKcal = ns.length>=2 ? ns[1] : ns[0]; }
  }

  // Sicherheitsnetz: zerfällt der Ring (533 / 2.267 / 0) bei der OCR in getrennte Zeilen, erwischt die
  // Positionslogik evtl. die "0". Dann aus den Top-Zahlen (keine Makro/kcal-Zeile, 100..9999) die nehmen,
  // die dem berechneten Rest (computedKcal) am nächsten ist — der angezeigte "Übrig"-Wert liegt da immer nah dran.
  const cands = [];
  for (const ln of lines){ if(isMacroBar(ln)||isKcal(ln))continue; for(const v of numsIn(ln)) if(v>=100&&v<=9999) cands.push(v); }
  let best = null;
  for (const v of cands) if (best==null || Math.abs(v-computedKcal) < Math.abs(best-computedKcal)) best = v;

  let kcal, kcalComputed = false;
  if (posKcal == null) { if (best != null) kcal = best; else { kcal = computedKcal; kcalComputed = true; } }
  else if (posKcal < 0.6*computedKcal && best != null && Math.abs(best-computedKcal) < Math.abs(posKcal-computedKcal)) kcal = best;
  else kcal = posKcal;

  // 3) "g→9"-Korrektur: liest die OCR das Einheiten-"g" als "9" und hängt es an die Total-Zahl ("341 g" → "3419"),
  //    explodiert das Total → unrealistische Restmakros. Wenn ein angezeigter Übrig-Wert vorliegt UND die Rest-kcal
  //    absurd hoch sind, jedes Total mit/ohne Trailing-9 durchprobieren und die Kombi nehmen, deren Rest-kcal dem Übrig
  //    am nächsten liegt. Greift NUR bei aufgeblähten Werten (>6000 kcal) — saubere/Ring-Split-Fälle bleiben unberührt.
  if (!kcalComputed && computedKcal > 6000 && kcal > 0) {
    const eat = macros.map(p => p.eaten);
    const opt = macros.map(p => (p.total % 10 === 9 && p.total >= 20) ? [p.total, (p.total - 9) / 10] : [p.total]);
    let bestC = null;
    for (const a of opt[0]) for (const b of opt[1]) for (const c of opt[2]) {
      const rr = [Math.max(0,a-eat[0]), Math.max(0,b-eat[1]), Math.max(0,c-eat[2])];
      const d = Math.abs((rr[0]*4 + rr[1]*4 + rr[2]*9) - kcal);
      if (bestC == null || d < bestC.d) bestC = { d, rr };
    }
    carbs = bestC.rr[0]; protein = bestC.rr[1]; fat = bestC.rr[2];
    computedKcal = carbs*4 + protein*4 + fat*9;
  }
  // Plausibilitäts-Stopp: wenn die Rest-Makros trotzdem absurd zum angezeigten Übrig passen, lieber abbrechen
  // als Müll eintragen (onImport zeigt dann den OCR-Text zur Diagnose).
  if (!kcalComputed && kcal > 0 && computedKcal > kcal * 3 + 1500) return null;

  // 4) Fett an die angezeigten Rest-Kalorien angleichen: ergeben die Rest-Makros zusammen MEHR kcal als "Übrig"
  //    (Rundung / Ballaststoff-Kalorien / App-Inkonsistenz), Fett so weit senken (≥0), dass 4·C + 4·P + 9·F = Übrig aufgeht.
  if (!kcalComputed && kcal > 0 && (4*carbs + 4*protein + 9*fat) > kcal) {
    fat = Math.max(0, Math.round((kcal - 4*carbs - 4*protein) / 9 * 10) / 10);
  }

  const r = { carbs, protein, fat, kcal };
  if (kcalComputed) r.kcalComputed = true;
  return r;
}

// Bild für die OCR aufbereiten: zu große Screenshots verkleinern (iOS-Speicher), KLEINE hochskalieren
// (Makro-Balken-Schrift ist winzig → größere Glyphen = deutlich bessere Erkennung, weniger "g→9"-Fehler).
// maxSide = Downscale-Obergrenze; kleiner als ~1700px → hoch auf ~2400px (Ziel). Gibt Blob oder Original zurück.
function downscaleImage(file, maxSide) {
  return new Promise(resolve => {
    try {
      const url = URL.createObjectURL(file), im = new Image();
      im.onload = () => {
        URL.revokeObjectURL(url);
        const mx = Math.max(im.width, im.height);
        let scale = 1;
        if (mx > maxSide) scale = maxSide / mx;            // zu groß → runter
        else if (mx < 1700) scale = Math.min(2.5, 2400 / mx); // klein → hoch (bessere OCR)
        if (Math.abs(scale - 1) < 0.01) { resolve(file); return; }
        const cv = document.createElement("canvas");
        cv.width = Math.round(im.width*scale); cv.height = Math.round(im.height*scale);
        const ctx = cv.getContext("2d");
        ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = "high";
        ctx.drawImage(im, 0, 0, cv.width, cv.height);
        cv.toBlob(b => resolve(b || file), "image/png");
      };
      im.onerror = () => { URL.revokeObjectURL(url); resolve(file); };
      im.src = url;
    } catch (e) { resolve(file); }
  });
}
// OCR eines Screenshots → geparste Makros (oder null). Tesseract.js kommt per <script>-CDN als globales Tesseract.
async function ocrMacroScreenshot(file, onProgress) {
  if (typeof Tesseract === "undefined") throw new Error("OCR library not loaded yet");
  const img = await downscaleImage(file, 2600);
  const { data } = await Tesseract.recognize(img, "deu", {
    logger: msg => { if (msg.status === "recognizing text" && onProgress) onProgress(msg.progress); }
  });
  return { text: data.text, parsed: parseMacroScreenshot(data.text) };
}

// Standard salad = all except jalapenos, sweetcorn, olives
const STD_SALAD_IDS = ["lettuce","tomatoes","cucumber","pickles","peppers","red_onions"];
const STD_SALAD = D.salads.filter(s=>STD_SALAD_IDS.includes(s.id));

function optimize(t, mode, p, noSauce, noCheese, breadsOk, sz, noSides, noRoastChicken, forceCheese, doubleCheese) {
  const m = sz==="footlong"?2:1;
  // Käse-Pool: "No cheese" → none; "Cheese" bzw. "Double cheese" → einer der beiden Käse (kein none); sonst alle
  const ch = noCheese ? D.cheeses.filter(c=>c.id==="none") : (forceCheese||doubleCheese) ? D.cheeses.filter(c=>c.id!=="none") : D.cheeses;
  const prots = noRoastChicken ? D.proteins.filter(x=>x.id!=="roast_chicken") : D.proteins; // Schalter "No Roast Chicken Breast"
  // breadsOk: null/undefined = alle Brote · String = genau ein Brot (Legacy) · Objekt {id:true,...} = erlaubte Auswahl
  // (leeres Objekt bzw. nichts ausgewählt → alle Brote). Der Optimizer wählt je Ergebnis das best-passende erlaubte Brot.
  const breadOk = b => { if(!breadsOk) return true; if(typeof breadsOk==="string") return b.id===breadsOk;
    const sel=D.breads.filter(x=>breadsOk[x.id]); return sel.length ? !!breadsOk[b.id] : true; };
  const br = D.breads.filter(breadOk);
  const R = [];
  for(const b of br) for(const pr of prots) for(const c of ch) {
    const cx = (doubleCheese&&c.id!=="none") ? [c,c] : [c]; // "Double cheese"-Schalter: Käse zählt doppelt
    const base=[b,pr,...cx,...STD_SALAD], bn=sumN(base,m), bs=score(bn,t,mode,p); // Std-Salad (Vegetables) gehört zum Sub → ×m (footlong verdoppelt)
    R.push({bread:b,protein:pr,cheese:c,extras:[],sauces:[],nutrition:bn,score:bs});
    for(let i=0;i<D.extras.length;i++){
      const n1=sumN([...base,D.extras[i]],m), s1=score(n1,t,mode,p);
      if(s1<bs+0.5) R.push({bread:b,protein:pr,cheese:c,extras:[D.extras[i]],sauces:[],nutrition:n1,score:s1});
      for(let j=i+1;j<D.extras.length;j++){
        const n2=sumN([...base,D.extras[i],D.extras[j]],m), s2=score(n2,t,mode,p);
        if(s2<bs+0.3) R.push({bread:b,protein:pr,cheese:c,extras:[D.extras[i],D.extras[j]],sauces:[],nutrition:n2,score:s2});
      }
    }
    if(!noSauce&&bs<3) for(const sc of D.sauces){
      const ns=sumN([...base,sc],m);
      R.push({bread:b,protein:pr,cheese:c,extras:[],sauces:[sc],nutrition:ns,score:score(ns,t,mode,p)});
    }
  }
  R.sort((a,b)=>a.score-b.score);
  if(noSides) return R.slice(0,20);
  // Sides: optional EINE Beilage (×1, NICHT footlong-verdoppelt). Die besten Subs um Side-Varianten + "ohne Side"
  // erweitern, neu scoren — der Optimizer nimmt nur dann eine Side, wenn sie den Score verbessert.
  const withSide=(n,sd)=>{const o={};for(const k of KEYS)o[k]=Math.round(((n[k]||0)+(sd[k]||0))*10)/10;return o;};
  const out=[];
  for(const r of R.slice(0,40)){
    out.push(r);
    for(const sd of D.sides){
      const n=withSide(r.nutrition,sd);
      out.push({...r,side:sd,nutrition:n,score:score(n,t,mode,p)});
    }
  }
  out.sort((a,b)=>a.score-b.score);
  return out.slice(0,20);
}

// Farmer J: Custom Fieldtray = Main × Base × (0–2 Sides). Sets laufen als fertige Alternativen mit.
// freeOnly=true: keine bezahlten Add-ons (Toppings / Sauce-Dip-Topping) vorschlagen.
function fjSideCombos() {
  const out=[[]];
  for(let i=0;i<FJ.sides.length;i++){
    out.push([FJ.sides[i]]);
    for(let j=i+1;j<FJ.sides.length;j++) out.push([FJ.sides[i],FJ.sides[j]]);
  }
  return out;
}
function optimizeFJ(t, mode, p, freeOnly) {
  const R=[], combos=fjSideCombos();
  for(const mn of FJ.mains) for(const ba of FJ.bases) for(const sides of combos) {
    const base=[mn,ba,...sides], bn=sumN(base,1), bs=score(bn,t,mode,p);
    R.push({main:mn,fjBase:ba,sides,tops:[],sdt:[],nutrition:bn,score:bs});
    if(!freeOnly){
      for(const x of FJ.toppings){
        const n1=sumN([...base,x],1), s1=score(n1,t,mode,p);
        if(s1<bs+0.3) R.push({main:mn,fjBase:ba,sides,tops:[x],sdt:[],nutrition:n1,score:s1});
      }
      for(const x of FJ.sdt){
        const n1=sumN([...base,x],1), s1=score(n1,t,mode,p);
        if(s1<bs+0.3) R.push({main:mn,fjBase:ba,sides,tops:[],sdt:[x],nutrition:n1,score:s1});
      }
    }
  }
  for(const st of FJ.sets){
    const n=sumN([st],1);
    R.push({set:st,sides:[],tops:[],sdt:[],nutrition:n,score:score(n,t,mode,p)});
  }
  R.sort((a,b)=>a.score-b.score);
  return R.slice(0,20);
}

// Itsu: à la carte — kombiniert 1 bis maxN Items aus aktiven Kategorien, Duplikate erlaubt (z.B. 2× Gyoza).
// Triples per Beam-Suche (Erweiterung der besten 80 Paare), damit es auch mit allen Kategorien schnell bleibt.
function itsuLabel(items){
  const counts={};items.forEach(x=>counts[x.id]=(counts[x.id]||0)+1);
  const seen=new Set();
  return items.filter(x=>{if(seen.has(x.id))return false;seen.add(x.id);return true;})
    .map(x=>(counts[x.id]>1?counts[x.id]+"× ":"")+x.name).join(" + ");
}
// Getränke sind IMMER ausgeschlossen (drink:true-Kategorien). Der Schalter "No soups, desserts, snacks etc."
// nimmt zusätzlich healthy soups, hot noodles und desserts & snacks komplett raus.
const ITSU_DRINK_CATS=new Set(ITSU.cats.filter(c=>c.drink).map(c=>c.id));
const ITSU_LIGHT_CATS=new Set(["healthy_soups","hot_noodles","desserts_snacks"]);
// Gemeinsamer À-la-carte-Kern (Itsu, Pret, Nando's, Wagamama): Singles + Paare voll, Triples per Beam
// (beste 80 Paare). maxN=Infinity (∞-Chip): Stufe 4+ erweitert die besten Kombos so lange um je 1 Item,
// wie sich der Score verbessert — über dem Ziel verschlechtern Zusätze, die Suche stirbt natürlich aus.
// Schalentier-Filter (Krebstiere + Weichtiere) — User ist allergisch, daher PERMANENT ausgeschlossen (kein Schalter).
// Fisch (Lachs/Thunfisch/Kabeljau …) bleibt. "california" = California-Rolls (enthalten Krabbe/Surimi, oft ohne "crab"
// im Namen). SHELLFISH_NAMES = Itsu-Sets mit Krebstier-Allergen, deren Name das Schalentier nicht verrät.
const SHELLFISH_RE=/(prawn|shrimp|crab|lobster|langoustine|cray(fish)?|craw(fish)?|mussel|clam|oyster|squid|calamari|scallop|cockle|whelk|octopus|\bebi\b|california)/i;
const SHELLFISH_NAMES=new Set(["best of itsu","itsu classics"]);
function isShellfish(x){ const n=((x&&x.name)||"").toLowerCase(); return SHELLFISH_RE.test(n)||SHELLFISH_NAMES.has(n); }

function alaCarteCombos(t, mode, p, pool, maxN) {
  pool=pool.filter(x=>!isShellfish(x)); // Schalentier permanent raus (Allergie)
  const R=[];
  const byScore=(a,b)=>a.score-b.score;
  for(const x of pool){const n=sumN([x],1);R.push({items:[x],nutrition:n,score:score(n,t,mode,p)});}
  if(maxN>=2){
    const pairs=[];
    for(let i=0;i<pool.length;i++)for(let j=i;j<pool.length;j++){
      const items=[pool[i],pool[j]],n=sumN(items,1);
      const r={items,nutrition:n,score:score(n,t,mode,p)};
      R.push(r);pairs.push(r);
    }
    if(maxN>=3){
      pairs.sort(byScore);
      const seen=new Set();
      let frontier=[];
      for(const pr of pairs.slice(0,80))for(const x of pool){
        const items=[...pr.items,x];
        const key=items.map(y=>y.id).sort().join("|");
        if(seen.has(key))continue;seen.add(key);
        const n=sumN(items,1);
        const r={items,nutrition:n,score:score(n,t,mode,p)};
        R.push(r);frontier.push(r);
      }
      let depth=3;
      while(depth<maxN&&depth<12&&frontier.length){ // harte Obergrenze 12 Items als Sicherheitsnetz
        frontier.sort(byScore);frontier=frontier.slice(0,80);
        const next=[];
        for(const pr of frontier)for(const x of pool){
          const items=[...pr.items,x];
          const key=items.map(y=>y.id).sort().join("|");
          if(seen.has(key))continue;seen.add(key);
          const n=sumN(items,1);
          const s=score(n,t,mode,p);
          if(s<pr.score){const r={items,nutrition:n,score:s};R.push(r);next.push(r);}
        }
        frontier=next;depth++;
      }
    }
  }
  R.sort(byScore);
  return R.slice(0,20);
}
// "only sushi" = Kategorie sushi & poké, aber OHNE die Poké-Bowls (User-Wunsch: nur Sushi/Sashimi).
// "only sushi w/o sashimi" = zusätzlich ohne Sashimi-Items. noSashimi ist die strengere Variante (impliziert only sushi).
const ITSU_SUSHI_CAT="sushi_poke";
const itsuDeacc=s=>s.normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase();
function optimizeItsu(t, mode, p, activeCats, maxN, noSoupsEtc, onlySushi, noSashimi) {
  let pool;
  if(onlySushi||noSashimi) pool=ITSU.items.filter(x=>{
    if(x.cat!==ITSU_SUSHI_CAT)return false;
    const n=itsuDeacc(x.name);
    if(n.includes("poke"))return false;            // Poké-Bowls raus
    if(noSashimi&&n.includes("sashimi"))return false;
    return true;
  });
  else pool=ITSU.items.filter(x=>activeCats[x.cat]&&!ITSU_DRINK_CATS.has(x.cat)&&!(noSoupsEtc&&ITSU_LIGHT_CATS.has(x.cat)));
  return alaCarteCombos(t,mode,p,pool,maxN);
}

// Pret: Getränke IMMER ausgeschlossen. Schalter-Vorrang: "Salads and protein pots only" > "only relevant
// items, no bullshit" (rel-Whitelist aus pret-update.js) > Kategorie-Chips.
const PRET_DRINK_CATS=new Set(PRET.cats.filter(c=>c.drink).map(c=>c.id));
const PRET_SALADS_CAT="salads_and_protein_pots";
function optimizePret(t, mode, p, activeCats, maxN, onlyRel, saladsOnly) {
  const pool=PRET.items.filter(x=>{
    if(PRET_DRINK_CATS.has(x.cat))return false;
    if(saladsOnly)return x.cat===PRET_SALADS_CAT;
    if(onlyRel)return !!x.rel;
    return activeCats[x.cat];
  });
  return alaCarteCombos(t,mode,p,pool,maxN);
}

// Nando's: Drinks sind gar nicht erst in den Daten (User-Vorgabe). Schalter "No desserts, Lunch Fix &
// platters" nimmt Desserts + The Lunch Fix + Sharing Platters raus.
const NANDOS_SWITCH_CATS=new Set(["desserts","the_lunch_fix","sharing_platters"]);
// "Main + two sides"-Modus: genau 1 Hauptgericht (Kategorie PERi-PERi Chicken ODER Burgers, Pittas, Wraps)
// + genau 2 Sides. Sides = alle cat:"sides" AUSSER Rostinas (User-Vorgabe; Duplikate erlaubt, z.B. 2× Chips).
// Wings respektieren den "No wings"-Schalter (Standard AN), sonst tauchen 10/5/3 Wings als "Main" auf.
const NANDOS_MAIN_CATS=new Set(["peri_peri_chicken","burgers_pittas_wraps"]);
function nandosMainTwoSides(t, mode, p, noWings){
  const mains=NANDOS.items.filter(x=>NANDOS_MAIN_CATS.has(x.cat)&&!(noWings&&x.wings));
  const sides=NANDOS.items.filter(x=>x.cat==="sides"&&x.id!=="rostinas");
  const R=[];
  for(const m of mains)for(let i=0;i<sides.length;i++)for(let j=i;j<sides.length;j++){
    const items=[m,sides[i],sides[j]],n=sumN(items,1);
    R.push({items,nutrition:n,score:score(n,t,mode,p)});
  }
  R.sort((a,b)=>a.score-b.score);
  return R.slice(0,20);
}
// Schalter: "Main + two sides" (eigener Modus, überstimmt alles), "No sauces" (sauce:true raus),
// "No grilled pineapple" (Pineapple-Item raus), "No wings / chicken livers" (wings:true raus),
// "No Corn on the Cob" (corn:true raus).
function optimizeNandos(t, mode, p, activeCats, maxN, noDesserts, noSauces, noPineapple, noWings, noCorn, mainTwoSides) {
  if(mainTwoSides) return nandosMainTwoSides(t,mode,p,noWings);
  const pool=NANDOS.items.filter(x=>activeCats[x.cat]&&!(noDesserts&&NANDOS_SWITCH_CATS.has(x.cat))&&!(noSauces&&x.sauce)&&!(noPineapple&&x.id==="grilled_pineapple")&&!(noWings&&x.wings)&&!(noCorn&&x.corn));
  return alaCarteCombos(t,mode,p,pool,maxN);
}

// Wagamama: à la carte wie Itsu/Pret/Nando's. Datenbestand wächst per Copy-Paste-Batches vom User
// (data/wagamama-raw.json → node wagamama-update.js). Schalter "No Ramen" schließt die ramen-Kategorie aus.
function optimizeWaga(t, mode, p, activeCats, maxN, noRamen) {
  const pool=WAGA.items.filter(x=>activeCats[x.cat]&&!(noRamen&&x.cat==="ramen"));
  return alaCarteCombos(t,mode,p,pool,maxN);
}

// German Doner Kebab (GDK): à la carte. Schalter "No Sauce" = alle sauce:true-Items raus
// (WITH SAUCE / plain Quesadilla / Ketchup-Juniors); Schalter "No rice bowl" = Kategorie rice_bowls raus.
function optimizeGDK(t, mode, p, activeCats, maxN, noSauce, noRiceBowl) {
  const pool=GDK.items.filter(x=>activeCats[x.cat]&&!(noSauce&&x.sauce)&&!(noRiceBowl&&x.cat==="rice_bowls"));
  return alaCarteCombos(t,mode,p,pool,maxN);
}

// The Fitness Chef (TFC): à la carte wie Itsu/Pret/Nando's/Wagamama/GDK (AC-Alias). Dishes kommen in 3 Größen
// (size wl/ml/wg) als eigene Items — der Optimizer wählt automatisch die passende Größe fürs Makroziel.
// Sides ohne Größe. Kein Schalter; nur Kategorie-Chips (Meat Dishes / Fish Dishes / Sides) + Max-Items.
function optimizeTFC(t, mode, p, activeCats, maxN, noFish) {
  const pool=TFC.items.filter(x=>activeCats[x.cat]&&!(noFish&&x.fish));
  return alaCarteCombos(t,mode,p,pool,maxN);
}

// Chopstix Noodle Bar: Build-a-Box. 2-Topping-Box (Regular) = base.reg + 2 Toppings; 3-Topping-Box (Large) = base.lg + 3 Toppings.
// Toppings mit Wiederholung erlaubt. Voll-Enumeration (3 Bases × [55 Paare + 220 Triples] = 825 Kombos). Eigene Result-Form.
function optimizeChopstix(t, mode, p) {
  const R1=v=>Math.round(v*10)/10;
  const add=(a,b)=>{const o={};for(const k of KEYS)o[k]=(a[k]||0)+(b[k]||0);return o;};
  const toN=s=>{const o={};for(const k of KEYS)o[k]=R1(s[k]);return o;};
  const T=CHOPSTIX.toppings, res=[];
  const mk=(box,nTop,base,baseN,tops)=>{let s=baseN;for(const tp of tops)s=add(s,tp);const n=toN(s);return {kind:"chopstix",box,nTop,base,tops,nutrition:n,score:score(n,t,mode,p)};};
  for(const b of CHOPSTIX.bases){
    for(let i=0;i<T.length;i++)for(let j=i;j<T.length;j++) res.push(mk("regular",2,b,b.reg,[T[i],T[j]]));            // 2-Topping = Regular Box
    for(let i=0;i<T.length;i++)for(let j=i;j<T.length;j++)for(let k=j;k<T.length;k++) res.push(mk("large",3,b,b.lg,[T[i],T[j],T[k]])); // 3-Topping = Large Box
  }
  res.sort((a,b)=>a.score-b.score);
  return res.slice(0,20);
}

// Five Guys: Build Your Own (Komponenten-Daten -> komponierte Produkte). Ein Ergebnis = 1 Main (Burger/Hot Dog/
// Sandwich) optional + 1 Fries optional (mind. eines) + freie Toppings auf dem Main (greedy, nur wenn sie den Score
// verbessern; max 6, jedes hoechstens 1x). Eigener BYO-Optimizer (wie UG/Atis/Chopstix), volle 8 Makros.
function optimizeFiveGuys(t, mode, p, noSauce, wrapOnly) {
  const M=FIVEGUYS.mods;
  const negBun=(()=>{const o={};for(const k of KEYS)o[k]=-(M.bun[k]||0);return o;})();
  const tops=FIVEGUYS.toppings.filter(x=>!(noSauce && x.sauce));
  const friesL=[null,...FIVEGUYS.fries];
  const paid=[{name:"Extra Patty",comp:M.patty},{name:"Cheese",comp:M.cheese},{name:"Bacon",comp:M.bacon}];
  // Konfigurierte Mains: Burger × Bun(Bun/Bowl/Wrap) × ExtraPatties; Sandwiches einfach; + "Fries only"
  // Extra Patties gibt es auf Deliveroo NUR bei den regulaeren Burgern, NICHT bei den "Little"-Burgern.
  // wrapOnly (Schalter "Lettuce Wrap"): erzwingt bei allen Burgern die Lettuce-Wrap-Bun-Option.
  const buns = wrapOnly ? ["wrap"] : ["bun","bowl","wrap"];
  const cfgs=[];
  for(const m of FIVEGUYS.mains){
    if(m.group==="burgers"){
      const maxEp=/^Little/.test(m.name)?0:2;
      for(const bun of buns) for(let ep=0;ep<=maxEp;ep++){
        const parts=[m];
        if(bun==="bowl")parts.push(negBun);
        else if(bun==="wrap"){parts.push(negBun);parts.push(M.lettuce);}
        for(let i=0;i<ep;i++)parts.push(M.patty);
        cfgs.push({main:m,bun,extraPatties:ep,parts,sandwich:false});
      }
    } else cfgs.push({main:m,bun:null,extraPatties:0,parts:[m],sandwich:m.group==="sandwiches"});
  }
  cfgs.push({main:null,bun:null,extraPatties:0,parts:[],sandwich:false}); // Fries only
  const res=[];
  for(const cfg of cfgs){
    for(const f of friesL){
      if(!cfg.main && !f) continue;
      const base=[...cfg.parts]; if(f)base.push(f);
      const chosenTops=[], chosenExtras=[];
      let curScore=score(sumN(base,1),t,mode,p);
      if(cfg.main){ // greedy: freie Toppings (+ Sandwich paid-extras) bis keine Score-Verbesserung
        // Toppings, die im Sandwich-Listenwert schon enthalten sind (incl), NICHT noch mal anbieten (kein Doppelzaehlen)
        const poolTops = cfg.main.incl ? tops.filter(tp=>!cfg.main.incl.includes(tp.id)) : tops;
        let improved=true;
        while(improved && (chosenTops.length+chosenExtras.length)<6){
          improved=false; let best=null, bestS=curScore, kind=null;
          const cur=[...base,...chosenTops,...chosenExtras.map(e=>e.comp)];
          for(const tp of poolTops){
            if(chosenTops.indexOf(tp)>=0)continue;
            const s=score(sumN([...cur,tp],1),t,mode,p);
            if(s<bestS-1e-9){bestS=s;best=tp;kind="top";}
          }
          if(cfg.sandwich)for(const ex of paid){
            if(chosenExtras.find(e=>e.name===ex.name))continue;
            const s=score(sumN([...cur,ex.comp],1),t,mode,p);
            if(s<bestS-1e-9){bestS=s;best=ex;kind="extra";}
          }
          if(best){ if(kind==="top")chosenTops.push(best); else chosenExtras.push(best); curScore=bestS; improved=true; }
        }
      }
      const n=sumN([...base,...chosenTops,...chosenExtras.map(e=>e.comp)],1);
      res.push({kind:"fiveguys",main:cfg.main,bun:cfg.bun,extraPatties:cfg.extraPatties,extras:chosenExtras.map(e=>e.name),tops:chosenTops,fries:f,nutrition:n,score:score(n,t,mode,p)});
    }
  }
  res.sort((a,b)=>a.score-b.score);
  return res.slice(0,20);
}

// Pepe's Piri Piri: à la carte (AC-Alias). Produkte mit flavourMl>0 bekommen eine Pflicht-Flavour (global gewählt) —
// deren Makros (per 10 ml × flavourMl/10) werden additiv eingerechnet (Name kriegt das Flavour-Suffix).
// Schalter "No Sauce" filtert die sauce:true-Dips/Mayos. Pepe's hat keine Ballaststoffe (fibre=0).
function optimizePepes(t, mode, p, activeCats, maxN, noSauce, flavourId) {
  const fl = PEPES.flavours.find(f=>f.id===flavourId) || PEPES.flavours[0];
  const pool = PEPES.items.filter(x=>activeCats[x.cat] && !(noSauce && x.sauce)).map(x=>{
    if(!x.flavourMl) return x;
    const m = x.flavourMl/10, o = {...x, name: x.name+" ("+fl.name+")"};
    for(const k of KEYS) o[k] = Math.round(((x[k]||0)+(fl[k]||0)*m)*10)/10;
    return o;
  });
  return alaCarteCombos(t, mode, p, pool, maxN);
}

// Pizza Express: à la carte (AC-Alias). Volle 8 Makros aus der offiziellen PDF; KEINE Build-Your-Own-Add-ons
// (Crust-Wahl = die Standard- / Gluten-Free- / Vegan-Zeilen sind je eigene Items). Nur Kategorie-Filter + Max-Items.
function optimizePizzaExpress(t, mode, p, activeCats, maxN) {
  return alaCarteCombos(t, mode, p, PIZZAEXPRESS.items.filter(x=>activeCats[x.cat]), maxN);
}

// Leon: à la carte (AC-Alias, wie Itsu/Pizza Express). All-Day-Menü, volle 8 Makros. Sauces nicht in den Daten.
function optimizeLeon(t, mode, p, activeCats, maxN) {
  return alaCarteCombos(t, mode, p, LEON.items.filter(x=>activeCats[x.cat]), maxN);
}

// Bagel Factory: à la carte (AC-Alias) — Set-Menü (fertige Bagels + Sweets, per-portion, Werte für den Plain Bun).
// BUN-WAHL: vollwertige Bagels (bunSwap:true) werden je erlaubtem Bun als Variante gerechnet = Bagel − Plain Bun +
// gewählter Bun (math. validiert am Cream Cheese Bagel). Mini (Mini-Bun, keine Alternativen) + Sweets: keine Bun-Wahl.
// EXTRAS/SAUCES (Fillings) der PDF nur per-100g → Fillings/BYO nicht abbildbar. Schalter "No snacks & sweet treats".
const BF_PLAIN_BUN = BAGELFACTORY.buns.find(b=>b.plain);
function bfBunOk(b, bunsOk){ // wie Subway breadOk: null/leer = alle Buns; sonst nur gewählte (nichts gewählt → alle)
  if(!bunsOk) return true;
  const sel=BAGELFACTORY.buns.filter(x=>bunsOk[x.id]);
  return sel.length ? !!bunsOk[b.id] : true;
}
function bfSwap(item, bun){ // Plain lässt das Item unverändert; sonst Bagel − Plain Bun + gewählter Bun
  if(bun.plain||!BF_PLAIN_BUN) return item;
  const o={id:item.id+"__"+bun.id, name:item.name+" ("+bun.name+")", cat:item.cat, bun:bun.name};
  for(const k of KEYS) o[k]=Math.round((item[k]-BF_PLAIN_BUN[k]+bun[k])*10)/10;
  return o;
}
function optimizeBagelFactory(t, mode, p, activeCats, maxN, noSweets, bunsOk, noPork){
  const base=BAGELFACTORY.items.filter(x=>activeCats[x.cat]&&!(noSweets&&x.cat==="sweets")&&!(noPork&&x.id==="smoky_pulled_pork"));
  const buns=BAGELFACTORY.buns.filter(b=>bfBunOk(b,bunsOk));
  const pool=[];
  for(const it of base){
    if(it.bunSwap&&buns.length) for(const b of buns) pool.push(bfSwap(it,b));
    else pool.push(it);
  }
  return alaCarteCombos(t,mode,p,pool,maxN);
}

// Wasabi: à la carte (AC-Alias, wie Itsu). Volle Makros AUSSER Ballaststoffe (fibre=0). Getränke nicht in den Daten.
// Schalter: "No soups" (Soup-Kategorie raus), "only sushi" (nur Sushi), "only sushi w/o sashimi" (Sushi ohne Sashimi-Namen).
const WASABI_SOUP_CAT="soup", WASABI_SUSHI_CAT="sushi";
// "good meals only"-Schalter: nur Salads&Boxes (salads) + Hot Bento & Kobachi (bento) + Sides — kein Sushi/Soup/Cold Sides/Breakfast/Sauces
const WASABI_GOODMEAL_CATS=["salads","bento","sides"];
function optimizeWasabi(t, mode, p, activeCats, maxN, noSoup, onlySushi, noSashimi, goodMeals) {
  let pool;
  if(onlySushi||noSashimi) pool=WASABI.items.filter(x=>x.cat===WASABI_SUSHI_CAT && !(noSashimi && x.name.toLowerCase().includes("sashimi")));
  else if(goodMeals) pool=WASABI.items.filter(x=>WASABI_GOODMEAL_CATS.includes(x.cat));
  else pool=WASABI.items.filter(x=>activeCats[x.cat] && !(noSoup && x.cat===WASABI_SOUP_CAT));
  return alaCarteCombos(t, mode, p, pool, maxN);
}

// "All restaurants": restaurantsübergreifend die besten Bestellungen. Jedes Restaurant läuft mit ALLEN
// Exclude-Schaltern AN (Itsu only-sushi/w-o-sashimi AUS, User-Vorgabe), Default-Kategorien, à-la-carte max 5,
// Subway-Brot frei + aktuelle Größe. Jedes Ergebnis bekommt _resto; gemerged + nach Score sortiert; Top 20.
function optimizeAll(t, mode, p, subSize, only, acMaxN) {
  const def = cats => { const o={}; cats.forEach(c=>o[c.id]=c.on); return o; };
  const tag = (arr, rt) => (arr||[]).map(r=>{ r._resto=rt; return r; });
  const ok = rt => !only || only.includes(rt);   // only = optionale Whitelist (z.B. "Accurate restaurants")
  const N = acMaxN || 5;                          // max items pro à-la-carte-Bestellung (Cross-Restaurant-Chip; Default 5)
  let all = [];
  if(ok("subway")) all = all.concat(tag(optimize(t,mode,p,true,true,null,subSize,true,true),"subway"));   // No cheese + No sauce, Brot frei, subs-only, No roast chicken
  if(ok("farmerj")) all = all.concat(tag(optimizeFJ(t,mode,p,true),"farmerj"));                  // Free items only
  if(ok("itsu")) all = all.concat(tag(optimizeItsu(t,mode,p,def(ITSU.cats),N,true,false,false),"itsu"));   // No soups…; only-sushi AUS
  if(ok("pret")) all = all.concat(tag(optimizePret(t,mode,p,def(PRET.cats),N,true,true),"pret"));          // only relevant + Salads only
  if(ok("nandos")) all = all.concat(tag(optimizeNandos(t,mode,p,def(NANDOS.cats),N,true,true,true,true,true),"nandos"));
  if(ok("wagamama")) all = all.concat(tag(optimizeWaga(t,mode,p,def(WAGA.cats),N,true),"wagamama"));        // No Ramen
  if(ok("gdk")) all = all.concat(tag(optimizeGDK(t,mode,p,def(GDK.cats),N,true,true),"gdk"));              // No Sauce + No rice bowl
  if(ok("atis")) all = all.concat(tag(optimizeAtis(t,mode,p,"plate",true,true),"atis"));                   // No crunch + No sauce
  if(ok("tfc")) all = all.concat(tag(optimizeTFC(t,mode,p,def(TFC.cats),N,true),"tfc"));                   // No fish
  if(ok("ug")){ all = all.concat(tag(optimizeUG(t,mode,p,"salad",true,true,true),"ug"));                   // BYO Salad, No nuts + No dressing + cap pickles
    all = all.concat(tag(optimizeUG(t,mode,p,"tray",true,true,true),"ug")); }                              // BYO Tray
  if(ok("chopstix")) all = all.concat(tag(optimizeChopstix(t,mode,p),"chopstix"));                         // Build-a-Box (2 + 3 Toppings)
  if(ok("pepes")) all = all.concat(tag(optimizePepes(t,mode,p,def(PEPES.cats),N,true,"plain"),"pepes"));   // à la carte, No Sauce, No Flavour (Plain)
  if(ok("fiveguys")) all = all.concat(tag(optimizeFiveGuys(t,mode,p,true),"fiveguys"));                    // Build your own: Main + Fries + Toppings, No sauce
  if(ok("pizzaexpress")) all = all.concat(tag(optimizePizzaExpress(t,mode,p,def(PIZZAEXPRESS.cats),N),"pizzaexpress")); // à la carte (volle PDF-Makros)
  if(ok("wasabi")) all = all.concat(tag(optimizeWasabi(t,mode,p,def(WASABI.cats),N,false,false,false,true),"wasabi")); // "good meals only" (Salads&Boxes/Bento/Kobachi/Sides) = neuer Default
  if(ok("leon")) all = all.concat(tag(optimizeLeon(t,mode,p,def(LEON.cats),N),"leon")); // à la carte (All-Day)
  if(ok("bagelfactory")) all = all.concat(tag(optimizeBagelFactory(t,mode,p,def(BAGELFACTORY.cats),N,true,null),"bagelfactory")); // Set-Menü, No sweets, alle Buns
  all.sort((a,b)=>a.score-b.score);
  // Vielfalt: max. 1 Treffer pro Restaurant (User-Wunsch 15.06.2026 — nur die jeweils beste Bestellung je Restaurant).
  // Klick auf ein Ergebnis öffnet ohnehin das volle Restaurant. Greedy in Score-Reihenfolge -> bleibt aufsteigend sortiert.
  const perR={}, out=[];
  for(const r of all){ const c=perR[r._resto]||0; if(c>=1)continue; perR[r._resto]=c+1; out.push(r); if(out.length>=20)break; }
  return out;
}
// "Accurate restaurants": Teilmenge mit verlaesslicheren Daten (ohne GDK/Chopstix/Five Guys — Komposition/Anomalien)
const ACCURATE_RESTOS = ["subway","farmerj","itsu","pret","nandos","ug","wagamama","atis","tfc","pepes","pizzaexpress","wasabi"];
const RESTO_NAME = {subway:"Subway",farmerj:"Farmer J",itsu:"Itsu",pret:"Pret",nandos:"Nando's",ug:"Urban Greens",wagamama:"Wagamama",gdk:"GDK",atis:"Atis",tfc:"The Fitness Chef",chopstix:"Chopstix",pepes:"Pepe's",fiveguys:"Five Guys",pizzaexpress:"Pizza Express",wasabi:"Wasabi",leon:"Leon",bagelfactory:"Bagel Factory"};

// ── "Add own order" — restaurantsuebergreifender Such-Index (zum nachtraeglichen Tracken eines gekauften Gerichts) ──
// Sammelt jedes Food-Item/jede Komponente mit echten 8 Makros aus ALLEN Restaurants in eine flache, durchsuchbare Liste.
// Bewusst ausgelassen: Pepe's per-10ml-Flavours, Five-Guys-`mods` (Bun/Patty-Deltas, teils negativ), Atis Large-Dubletten (basesL/saucesL, ungenutzt).
function buildSearchIndex(){
  const out=[];
  const push=(resto,name,it)=>{ if(it && typeof it.kcal==="number" && name && !isShellfish({name})) out.push({resto,name, // Schalentier permanent raus (Allergie)
    kcal:it.kcal, fat:it.fat||0, sat:it.sat||0, carbs:it.carbs||0, sugars:it.sugars||0, fibre:it.fibre||0, protein:it.protein||0, salt:it.salt||0}); };
  const addArr=(resto,arr)=>{ (arr||[]).forEach(it=>push(resto,it.name,it)); };
  addArr("Itsu",ITSU.items); addArr("Pret",PRET.items); addArr("Nando's",NANDOS.items);
  addArr("Wagamama",WAGA.items); addArr("GDK",GDK.items); addArr("The Fitness Chef",TFC.items);
  addArr("Pepe's",PEPES.items); addArr("Pizza Express",PIZZAEXPRESS.items); addArr("Wasabi",WASABI.items); addArr("Leon",LEON.items); addArr("Bagel Factory",BAGELFACTORY.items);
  ["breads","proteins","cheeses","extras","salads","sauces","seasonings"].forEach(k=>addArr("Subway",D[k]));
  ["mains","bases","sides","toppings","sdt","sets"].forEach(k=>addArr("Farmer J",FJ[k]));
  ["greens","carbs","prots","veg","tops","dress","scoops"].forEach(k=>addArr("Urban Greens",UG[k]));
  ["bases","mixed","ingredients","proteins","sauces","crunches","addons"].forEach(k=>addArr("Atis",ATIS[k]));
  ["mains","fries","toppings"].forEach(k=>addArr("Five Guys",FIVEGUYS[k]));
  addArr("Chopstix",CHOPSTIX.toppings);
  (CHOPSTIX.bases||[]).forEach(b=>{ if(b.reg)push("Chopstix",b.name+" (Regular)",b.reg); if(b.lg)push("Chopstix",b.name+" (Large)",b.lg); });
  // exakte Duplikate (gleiches Restaurant+Name+kcal, z.B. Wasabi-Item in 2 Kategorien) entfernen
  const seen=new Set(), uniq=[];
  for(const x of out){ const k=x.resto+"|"+x.name+"|"+x.kcal; if(seen.has(k))continue; seen.add(k); uniq.push(x); }
  return uniq;
}
const SEARCH_INDEX = buildSearchIndex();
// Substring-Suche (alle Begriffe muessen in Name+Restaurant vorkommen), nach kuerzestem Namen (= bester Treffer) sortiert
function searchItems(query, limit){
  const q=(query||"").trim().toLowerCase(); if(!q) return [];
  const terms=q.split(/\s+/);
  return SEARCH_INDEX.filter(x=>{const hay=(x.name+" "+x.resto).toLowerCase(); return terms.every(t=>hay.includes(t));})
    .sort((a,b)=>a.name.length-b.name.length).slice(0, limit||60);
}
// Summe der Makros einer eigenen Bestellung ([{item,qty}]) — wie sumN, 1 Dezimale
function orderTotal(entries){
  const KS=["kcal","fat","sat","carbs","sugars","fibre","protein","salt"], t={}; KS.forEach(k=>t[k]=0);
  (entries||[]).forEach(e=>{ const it=e.item||{}, q=e.qty||0; KS.forEach(k=>t[k]+=(it[k]||0)*q); });
  KS.forEach(k=>t[k]=Math.round(t[k]*10)/10); return t;
}
// Kurze Order-Zusammenfassung pro Cross-Restaurant-Ergebnis (dispatch nach _resto)
function summarizeAcross(r){
  const rt=r._resto;
  if(rt==="subway")return r.protein.name+" · "+r.bread.name+(r.extras&&r.extras.length?" · +"+r.extras.map(x=>x.name).join(", +"):"");
  if(rt==="farmerj")return r.set?r.set.name:(r.main.name+(r.sides&&r.sides.length?" · "+r.sides.map(s=>s.name).join(" + "):""));
  if(rt==="ug")return (r.prot?r.prot.name:"No protein")+" · "+(r.kind==="tray"?"Tray":"Salad")+(r.carb?" · "+r.carb.name:"");
  if(rt==="atis")return (r.prots&&r.prots.length?r.prots.map(x=>x.name).join(" + "):"No protein")+" · Power Plate";
  if(rt==="chopstix")return (r.box==="large"?"Large Box":"Regular Box")+" · "+r.base.name+" · "+itsuLabel(r.tops);
  if(rt==="fiveguys")return (r.main?r.main.name:"Fries only")+(r.fries&&r.main?" + "+r.fries.name:r.fries?"":"")+(r.tops&&r.tops.length?" · +"+r.tops.length+" toppings":"");
  return itsuLabel(r.items); // AC-Familie (itsu/pret/nandos/wagamama/gdk/tfc)
}

// Urban Greens: NUR Build Your Own (Salad/Tray), fertige Gerichte bewusst entfernt.
// BYO Salad: Green Base (oder keine) + Carb Base (oder keine) + Protein (oder keins) + GENAU 3 Veg/Pickles
// + GENAU 2 Toppings (außer "No nuts" → 0) + 0–1 Dressing ("No Dressing" erzwingt 0, auch Extra-Dressings)
// + optional 1 Extra-Protein + optional bis 2 Extras. BYO Tray: ohne Green Base/Standard-Dressing,
// dafür PFLICHT-Scoop (genau 1). Beam-Suche: pro Stufe bleiben nur die besten Kandidaten (heuristisch).
const UG_VEG_TRIPLES=(()=>{const v=UG.veg,out=[];
  for(let i=0;i<v.length;i++)for(let j=i+1;j<v.length;j++)for(let k=j+1;k<v.length;k++)out.push([v[i],v[j],v[k]]);
  return out;})();
function optimizeUG(t, mode, p, ugMode, noNuts, noDress, capPickles) {
  // BYO Salad und BYO Tray als getrennte Beam-Pipelines (ugMode "salad" | "tray").
  // Performance: alles über vorberechnete kcal/P/F/C-Summen; _s = ungerundete Laufsumme,
  // nutrition = gerundete Anzeige-Kopie (sat/sugars/fibre/salt = 0, keine Daten im Guide).
  const R1=v=>Math.round(v*10)/10;
  const prots=UG.prots.filter(x=>!isShellfish(x)); // Schalentier (Shrimp) permanent raus (Allergie)
  const mac=arr=>{const s={kcal:0,protein:0,fat:0,carbs:0};for(const x of arr)if(x){s.kcal+=x.kcal;s.protein+=x.protein;s.fat+=x.fat;s.carbs+=x.carbs;}return s;};
  const addM=(a,b)=>({kcal:a.kcal+b.kcal,protein:a.protein+b.protein,fat:a.fat+b.fat,carbs:a.carbs+b.carbs});
  const toN=s=>({kcal:R1(s.kcal),fat:R1(s.fat),sat:0,carbs:R1(s.carbs),sugars:0,fibre:0,protein:R1(s.protein),salt:0});
  const fin=(r,s)=>{r._s=s;r.nutrition=toN(s);r.score=score(r.nutrition,t,mode,p);return r;};
  const byScore=(a,b)=>a.score-b.score;
  const tripleSums=UG_VEG_TRIPLES.map(mac);
  // Toppings: GENAU 2 (Deliveroo Pflicht) — außer "No nuts" (dann 0, User-Vorgabe)
  const pairs=[],pairSums=[];
  for(let i=0;i<UG.tops.length;i++)for(let j=i+1;j<UG.tops.length;j++){
    pairs.push([UG.tops[i],UG.tops[j]]);pairSums.push(mac([UG.tops[i],UG.tops[j]]));
  }
  const addTops=(cands,keep)=>{
    if(noNuts)return cands;
    const next=[];
    for(const r of cands)for(let pi=0;pi<pairs.length;pi++)
      next.push(fin({...r,tops:pairs[pi]},addM(r._s,pairSums[pi])));
    next.sort(byScore);return next.slice(0,keep);
  };
  // Extra-Protein: Deliveroo-Liste ohne Avocado Whole (noExtra-Flag)
  const xprots=prots.filter(x=>!x.noExtra);
  const xpSums=xprots.map(x=>mac([x]));
  const addProt2=cands=>{
    const next=[...cands];
    for(const r of cands.slice(0,300))for(let pi=0;pi<xprots.length;pi++){
      const v=fin({...r,prot2:xprots[pi]},addM(r._s,xpSums[pi]));
      if(v.score<r.score)next.push(v);
    }
    next.sort(byScore);return next.slice(0,400);
  };
  // Extras (alle "Any ...?"-Schritte): Extra-Veg (ohne Cucumber, + Leafy Greens), Scoops/Premiums,
  // Toppings (außer "No nuts"), Extra-Dressings (außer "No Dressing") — bis 2, nur bei Verbesserung
  // Schalter "Max 1x ...": diese 3 Items duerfen pro Bestellung max. 1x vorkommen (Triple-Veg + Extra-Veg zusammen).
  // Duplikate entstehen nur in addExtras (Triples sind i<j<k); hier also pruefen, bevor ein gecapptes Item ergaenzt wird.
  const CAP_IDS = new Set(["tajin_sweetcorn","pickled_onions","pickled_cabbage"]);
  const capOk = (r, addIts) => {
    if(!capPickles) return true;
    const c={}; const tally=it=>{ if(it && CAP_IDS.has(it.id)) c[it.id]=(c[it.id]||0)+1; };
    (r.veg||[]).forEach(tally); (r.extras||[]).forEach(e=>tally(e.it)); addIts.forEach(tally);
    return Object.values(c).every(n=>n<=1);
  };
  const addExtras=cands=>{
    const pool=[
      {it:UG.greens[0],kind:"veg"},
      ...UG.veg.filter(x=>!x.noExtra).map(x=>({it:x,kind:"veg"})),
      ...UG.scoops.map(x=>({it:x,kind:"scoop"})),
      ...(noNuts?[]:UG.tops.map(x=>({it:x,kind:"top"}))),
      ...(noDress?[]:UG.dress.map(x=>({it:x,kind:"dressing"}))),
    ].map(e=>({...e,sum:mac([e.it])}));
    const next=[...cands];
    for(const r of cands.slice(0,100))for(let i=0;i<pool.length;i++){
      if(!capOk(r,[pool[i].it]))continue;
      const v=fin({...r,extras:[pool[i]]},addM(r._s,pool[i].sum));
      if(v.score>=r.score)continue;
      next.push(v);
      for(let j=i;j<pool.length;j++){
        if(!capOk(r,[pool[i].it,pool[j].it]))continue;
        const v2=fin({...v,extras:[pool[i],pool[j]]},addM(v._s,pool[j].sum));
        if(v2.score<v.score)next.push(v2);
      }
    }
    next.sort(byScore);return next;
  };
  // ── ugMode "tray" — BYO Tray: Carb Base + Protein + 3 Veg → 1 Scoop (PFLICHT) → 2 Toppings;
  // kein Green-Base-Schritt, kein Standard-Dressing (Dressings nur über "Any Extra Dressing?" = Extras) ──
  if(ugMode==="tray"){
    let tray=[];
    for(const c of [...UG.carbs,null]) for(const pr of [...prots,null]){
      const bs=mac([c,pr]);
      for(let ti=0;ti<UG_VEG_TRIPLES.length;ti++)
        tray.push(fin({kind:"tray",green:null,carb:c,prot:pr,veg:UG_VEG_TRIPLES[ti],scoop:null,prot2:null,tops:[],dress:null,extras:[]},addM(bs,tripleSums[ti])));
    }
    tray.sort(byScore);tray=tray.slice(0,700);
    const sSums=UG.scoops.map(x=>mac([x]));
    const next=[];
    for(const r of tray)for(let si=0;si<UG.scoops.length;si++)
      next.push(fin({...r,scoop:UG.scoops[si]},addM(r._s,sSums[si])));
    next.sort(byScore);tray=next.slice(0,600);
    tray=addTops(tray,500);
    tray=addProt2(tray);
    tray=addExtras(tray);
    return tray.slice(0,20);
  }
  // ── ugMode "salad" — BYO Salad: Green Base + Carb Base + Protein + 3 Veg → 2 Toppings → 0–1 Dressing ──
  let sal=[];
  for(const g of [...UG.greens,null]) for(const c of [...UG.carbs,null]) for(const pr of [...prots,null]){
    const bs=mac([g,c,pr]);
    for(let ti=0;ti<UG_VEG_TRIPLES.length;ti++)
      sal.push(fin({kind:"salad",green:g,carb:c,prot:pr,veg:UG_VEG_TRIPLES[ti],scoop:null,prot2:null,tops:[],dress:null,extras:[]},addM(bs,tripleSums[ti])));
  }
  sal.sort(byScore);sal=sal.slice(0,800);
  sal=addTops(sal,600);
  if(!noDress){
    const dSums=UG.dress.map(d=>mac([d]));
    const next=[];
    for(const r of sal){
      next.push(r);
      for(let di=0;di<UG.dress.length;di++)next.push(fin({...r,dress:UG.dress[di]},addM(r._s,dSums[di])));
    }
    next.sort(byScore);sal=next.slice(0,500);
  }
  sal=addProt2(sal);
  sal=addExtras(sal);
  return sal.slice(0,20);
}

// ── Atis (atisfood.com, London) — Build Your Own. ATIS-Block oben via node atis-update.js.
// Aktuell implementiert: "Build Your Own Power Plate" (atisMode "plate"); Bowl-Flow folgt vom User.
// Power Plate: unterstrichene Items (doublePlate = 4 Carb-Bases + 4 Mixed Salads) zählen ×2 (Doppelportion).
// Schritte: Bases (Pflicht 1-2) · Mixed Salad (Pflicht 1) · Ingredients (Pflicht 1-2) · Add-ons (0-3) ·
// Sauce (Pflicht 1 oder keine) · Crunch (Pflicht 1 oder keine) · Proteins (0-3, bezahlt).
// Schalter noSauce/noCrunch erzwingen die "I Don't Want A …"-Option (0 für den Schritt).
// Pool-Ausschlüsse ggü. Katalog (= aktueller Deliveroo-Power-Plate-Flow): Kale + Cabbage Mix (Base);
// Pesto/Lemon Oregano + einzelne Olive Oil/Balsamic Vinegar (Sauce, stattdessen Kombi unten); Focaccia (Add-on).
const ATIS_BASE_EXCLUDE=new Set(["kale_cabbage_mix"]);
const ATIS_SAUCE_EXCLUDE=new Set(["pesto_vinaigrette","lemon_oregano_dressing","the_olive_oil_guy_olive_oil","balsamic_vinegar"]);
const ATIS_ADDON_EXCLUDE=new Set(["the_dusty_knuckle_focaccia"]);
// Kombi-Sauce "Olive Oil + Balsamic Vinegar" (im Power-Plate-Flow nur als Paar wählbar)
const ATIS_OIL_COMBO=(()=>{
  const oo=ATIS.sauces.find(x=>x.id==="the_olive_oil_guy_olive_oil"),bv=ATIS.sauces.find(x=>x.id==="balsamic_vinegar");
  const o={id:"olive_oil_balsamic",name:"Olive Oil + Balsamic Vinegar"};
  for(const k of KEYS)o[k]=(oo?oo[k]:0)+(bv?bv[k]:0);
  if(oo&&oo.seasonal)o.seasonal=true;
  return o;
})();
function optimizeAtis(t, mode, p, atisMode, noCrunch, noSauce){
  const dbl=atisMode!=="bowl"; // Power Plate (Default): doublePlate-Items ×2; Bowl: ×1
  const R1=v=>Math.round(v*10)/10;
  const eff=it=>{const m=(dbl&&it.doublePlate)?2:1;const o={it};for(const k of KEYS)o[k]=(it[k]||0)*m;return o;};
  const z=()=>{const o={};for(const k of KEYS)o[k]=0;return o;};
  const add=(a,b)=>{const o={};for(const k of KEYS)o[k]=a[k]+b[k];return o;};
  const macE=arr=>{const o=z();for(const e of arr)if(e)for(const k of KEYS)o[k]+=e[k];return o;};
  const toN=s=>{const o={};for(const k of KEYS)o[k]=R1(s[k]);return o;};
  const fin=(r,s)=>{r._s=s;r.nutrition=toN(s);r.score=score(r.nutrition,t,mode,p);return r;};
  const byScore=(a,b)=>a.score-b.score;

  // ── Pools (eff-gewrappt: doublePlate ×2 in der Plate) ──
  const baseE=ATIS.bases.filter(x=>!ATIS_BASE_EXCLUDE.has(x.id)).map(eff);
  const mixedE=ATIS.mixed.map(eff);
  const ingE=ATIS.ingredients.map(eff);
  const protE=ATIS.proteins.map(eff);
  const sauceE=ATIS.sauces.filter(x=>!ATIS_SAUCE_EXCLUDE.has(x.id)).concat([ATIS_OIL_COMBO]).map(eff);
  const crunchE=ATIS.crunches.map(eff);
  const addonE=ATIS.addons.filter(x=>!ATIS_ADDON_EXCLUDE.has(x.id)).map(eff);

  // Extras-Stufe: Add-ons (0-2) + optional 3. Protein — nur bei Score-Verbesserung (wie UG addExtras)
  const addExtras=cands=>{
    const pool=[...addonE.map(e=>({e,kind:"addon"})),...protE.map(e=>({e,kind:"prot"}))];
    const next=[...cands];
    for(const r of cands.slice(0,120)){
      for(let i=0;i<pool.length;i++){
        if(pool[i].kind==="prot"&&r.prots.length>=3)continue;
        const r1=pool[i].kind==="addon"?{...r,addons:[...r.addons,pool[i].e.it]}:{...r,prots:[...r.prots,pool[i].e.it]};
        const v=fin(r1,add(r._s,pool[i].e));
        if(v.score>=r.score)continue;
        next.push(v);
        for(let j=i;j<pool.length;j++){
          if(pool[j].kind==="prot"&&v.prots.length>=3)continue;
          const r2=pool[j].kind==="addon"?{...v,addons:[...v.addons,pool[j].e.it]}:{...v,prots:[...v.prots,pool[j].e.it]};
          const v2=fin(r2,add(v._s,pool[j].e));
          if(v2.score<v.score)next.push(v2);
        }
      }
    }
    next.sort(byScore);return next;
  };

  if(atisMode==="bowl")return []; // Bowl-Flow noch nicht implementiert (Daten vorhanden)

  // ── Power Plate ──
  // Stufe 1: Backbone = Bases(1-2) × Mixed(1) × Ingredients(1-2) (alle Pflicht)
  const baseCombos=[],ingCombos=[];
  for(let i=0;i<baseE.length;i++){baseCombos.push([baseE[i]]);for(let j=i+1;j<baseE.length;j++)baseCombos.push([baseE[i],baseE[j]]);}
  for(let i=0;i<ingE.length;i++){ingCombos.push([ingE[i]]);for(let j=i+1;j<ingE.length;j++)ingCombos.push([ingE[i],ingE[j]]);}
  const baseSums=baseCombos.map(macE),ingSums=ingCombos.map(macE);
  let bb=[];
  for(let bi=0;bi<baseCombos.length;bi++)for(let mi=0;mi<mixedE.length;mi++){
    const bs=add(baseSums[bi],mixedE[mi]);
    for(let ii=0;ii<ingCombos.length;ii++)
      bb.push(fin({kind:"plate",bases:baseCombos[bi].map(e=>e.it),mixed:mixedE[mi].it,ing:ingCombos[ii].map(e=>e.it),prots:[],sauce:null,crunch:null,addons:[]},add(bs,ingSums[ii])));
  }
  bb.sort(byScore);bb=bb.slice(0,2000);
  // Stufe 2: Proteins 0-2 (Voll-Enumeration über die besten Backbones; 3. Protein via Extras)
  let cur=[];
  for(const r of bb){
    cur.push(r);
    for(let i=0;i<protE.length;i++)cur.push(fin({...r,prots:[protE[i].it]},add(r._s,protE[i])));
    for(let i=0;i<protE.length;i++)for(let j=i+1;j<protE.length;j++)cur.push(fin({...r,prots:[protE[i].it,protE[j].it]},add(add(r._s,protE[i]),protE[j])));
  }
  cur.sort(byScore);cur=cur.slice(0,800);
  // Stufe 3: Sauce (Pflicht 1, oder keine bei noSauce)
  if(!noSauce){
    const next=[];
    for(const r of cur){next.push(r);for(let i=0;i<sauceE.length;i++)next.push(fin({...r,sauce:sauceE[i].it},add(r._s,sauceE[i])));}
    next.sort(byScore);cur=next.slice(0,600);
  }
  // Stufe 4: Crunch (Pflicht 1, oder keine bei noCrunch)
  if(!noCrunch){
    const next=[];
    for(const r of cur){next.push(r);for(let i=0;i<crunchE.length;i++)next.push(fin({...r,crunch:crunchE[i].it},add(r._s,crunchE[i])));}
    next.sort(byScore);cur=next.slice(0,500);
  }
  // Stufe 5: Add-ons + 3. Protein (nur bei Verbesserung)
  cur=addExtras(cur);
  return cur.slice(0,20);
}

const S = {
  font: "'DM Sans',sans-serif",
  mono: "'DM Mono',monospace",
  green: "#009743",
  bg: "#0d0d0d",
};

function Chip({label,active,onClick,small}) {
  return h("button",{onClick,style:{
    padding:small?"4px 9px":"6px 13px",borderRadius:6,
    border:`1px solid ${active?S.green:"#3a3a3a"}`,
    background:active?"rgba(0,151,67,0.15)":"transparent",
    color:active?"#4ade80":"#999",fontSize:small?11:12,
    cursor:"pointer",fontFamily:S.mono,transition:"all .15s",
  }},label);
}

function NumIn({label,value,onChange,placeholder,unit,min=0}) {
  return h("div",{style:{flex:1,minWidth:80}},
    h("label",{style:{display:"block",fontSize:10,color:"#777",marginBottom:3,fontFamily:S.mono,textTransform:"uppercase",letterSpacing:1}},label),
    h("div",{style:{position:"relative"}},
      h("input",{type:"number",value,onChange:e=>onChange(e.target.value===""?"":Number(e.target.value)),
        placeholder,min,style:{width:"100%",padding:"9px 10px",paddingRight:unit?30:10,
        background:"#1a1a1a",border:"1px solid #333",borderRadius:6,color:"#fff",fontSize:14,
        fontFamily:S.mono,outline:"none",boxSizing:"border-box"}}),
      unit&&h("span",{style:{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",fontSize:10,color:"#555"}},unit)
    )
  );
}

function MacroBar({label,value,target,color,unit="g"}) {
  const pct=target>0?Math.min((value/target)*100,150):0;
  const diff=target>0?value-target:0;
  return h("div",{style:{marginBottom:6}},
    h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:11,fontFamily:S.mono,color:"#b0b0b0",marginBottom:2}},
      h("span",null,label),
      h("span",null,
        h("span",{style:{color:"#fff",fontWeight:600}},value,unit),
        target>0&&h("span",{style:{color:diff>0?"#ff6b6b":"#51cf66",marginLeft:4}},"(",diff>0?"+":"",Math.round(diff),unit,")")
      )
    ),
    target>0&&h("div",{style:{height:4,background:"#2a2a2a",borderRadius:2,overflow:"hidden"}},
      h("div",{style:{height:"100%",width:`${Math.min(pct,100)}%`,background:color,borderRadius:2,transition:"width .4s"}})
    )
  );
}

        h("div",{style:{fontSize:15,fontWeight:700,color:"#fff",marginBottom:4}},
          selA.prots.length?selA.prots.map(x=>x.name).join(" + "):"No protein"),
        h("div",{style:{fontSize:11,color:"#777",marginBottom:12,fontFamily:S.mono}},"Build Your Own Power Plate"),

        h("div",{style:{marginBottom:16}},
          h(MacroBar,{label:"Calories",value:ccAt.total.kcal,target:mode==="macros"?autoK:tK,color:"#4ade80",unit:" kcal"}),
          h(MacroBar,{label:"Carbs",value:ccAt.total.carbs,target:mode==="macros"?tC:0,color:"#fbbf24"}),
          h(MacroBar,{label:"Protein",value:ccAt.total.protein,target:mode==="macros"?tP:0,color:"#60a5fa"}),
          h(MacroBar,{label:"Fat",value:ccAt.total.fat,target:mode==="macros"?tF:0,color:"#f87171"})
        ),
        cornBaseRow(ccAt),

        // Komponenten (doublePlate-Items mit ×2 + verdoppeltem kcal)
        (()=>{
          const dk=it=>(atisMode!=="bowl"&&it.doublePlate)?it.kcal*2:it.kcal;
          const dn=it=>it.name+((atisMode!=="bowl"&&it.doublePlate)?" (double portion)":"");
          return h("div",{style:{marginBottom:6}},
            h("div",{style:{fontSize:10,color:"#555",fontFamily:S.mono,textTransform:"uppercase",letterSpacing:1,marginBottom:6}},"Components"),
            ...[["Bases",selA.bases],["Mixed Salad",[selA.mixed]],["Ingredients",selA.ing],
                ["Proteins",selA.prots],["Add-ons",selA.addons],
                ["Sauce",selA.sauce?[selA.sauce]:[]],["Crunch",selA.crunch?[selA.crunch]:[]]].filter(([l,arr])=>arr.length).map(([l,arr],gi)=>
              h("div",{key:gi,style:{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:"1px solid #1f1f1f"}},
                h("span",{style:{color:"#777",fontFamily:S.mono,fontSize:10,minWidth:90}},l),
                h("span",{style:{color:"#e0e0e0",textAlign:"right",flex:1}},arr.map(x=>dn(x)+" ("+dk(x)+")").join(", "))
              )),
            ccAt.n>0&&h("div",{key:"corn",style:{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderTop:"1px solid #1f1f1f",marginTop:2}},
              h("span",{style:{color:"#7a7",fontFamily:S.mono,fontSize:10,minWidth:90}},"Supplement"),
              h("span",{style:{color:"#7a7",textAlign:"right",flex:1}},ccAt.n+"× "+CORN_CAKE.name+" ("+Math.round(ccAt.n*CORN_CAKE.kcal*10)/10+")"))
          );
        })(),
        h("div",{style:{fontSize:10,color:"#666",marginBottom:14,fontFamily:S.mono}},"\"double portion\" = select once, Atis serves it double in the Power Plate (counts 2× in macros)"),

        // Order guide (Atis, Deliveroo-Schritte)
        (()=>{
          const box=(steps)=>h("div",{style:{background:"#0d0d0d",borderRadius:8,padding:14,border:"1px solid #2a2a2a"}},
            h("div",{style:{fontSize:10,color:S.green,fontFamily:S.mono,textTransform:"uppercase",letterSpacing:2,marginBottom:10,display:"flex",alignItems:"center",gap:6}},
              h("span",{style:{fontSize:13}},"📋")," Order guide (Deliveroo)"),
            ...steps.map((st,i)=>h("div",{key:i,style:{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0",borderBottom:i<steps.length-1?"1px solid #1a1a1a":"none"}},
              h("span",{style:{fontSize:9,color:"#555",fontFamily:S.mono,minWidth:16,textAlign:"right"}},i+1+"."),
              h("span",{style:{fontSize:10,color:"#777",fontFamily:S.mono,minWidth:100}},st.l),
              h("span",{style:{fontSize:12,color:"#e0e0e0",fontWeight:500,fontFamily:S.font}},st.v)
            ))
          );
          return box([
            {l:"Dish",v:"BYO Power Plate"},
            {l:"Bases (1-2)",v:selA.bases.map(x=>x.name).join(", ")},
            {l:"Mixed Salad",v:selA.mixed.name},
            {l:"Ingredients (1-2)",v:selA.ing.map(x=>x.name).join(", ")},
            {l:"Add-ons?",v:selA.addons.length?selA.addons.map(x=>x.name).join(", "):"–"},
            {l:"Sauce",v:selA.sauce?selA.sauce.name:"I Don't Want A Dressing"},
            {l:"Crunch",v:selA.crunch?selA.crunch.name:"I Don't Want A Crunch"},
            {l:"Proteins?",v:selA.prots.length?selA.prots.map(x=>x.name).join(", "):"–"},
            ...cornStep(ccAt),
          ]);
        })()
      ),

      // Detail panel (Chopstix — Build a Box)
      resto==="chopstix"&&selCh&&h("div",{style:{background:"#151515",borderRadius:12,border:"1px solid "+S.green,padding:16}},
        h("div",{style:{fontSize:15,fontWeight:700,color:"#fff",marginBottom:4}}, itsuLabel(selCh.tops)),
        h("div",{style:{fontSize:11,color:"#777",marginBottom:12,fontFamily:S.mono}},
          (selCh.box==="large"?"Large Box · 3 toppings":"Regular Box · 2 toppings")+" · "+selCh.base.name),

        h("div",{style:{marginBottom:16}},
          h(MacroBar,{label:"Calories",value:ccCh.total.kcal,target:mode==="macros"?autoK:tK,color:"#4ade80",unit:" kcal"}),
          h(MacroBar,{label:"Carbs",value:ccCh.total.carbs,target:mode==="macros"?tC:0,color:"#fbbf24"}),
          h(MacroBar,{label:"Protein",value:ccCh.total.protein,target:mode==="macros"?tP:0,color:"#60a5fa"}),
          h(MacroBar,{label:"Fat",value:ccCh.total.fat,target:mode==="macros"?tF:0,color:"#f87171"})
        ),
        cornBaseRow(ccCh),

        // Komponenten (Base in Box-Größe + Toppings)
        (()=>{
          const sz=selCh.box==="large"?"lg":"reg";
          return h("div",{style:{marginBottom:16}},
            h("div",{style:{fontSize:10,color:"#555",fontFamily:S.mono,textTransform:"uppercase",letterSpacing:1,marginBottom:6}},"Components"),
            ...[["Base",[selCh.base.name+" ("+selCh.base[sz].kcal+")"]],
                ["Toppings",selCh.tops.map(x=>x.name+" ("+x.kcal+")")]].map(([l,arr],gi)=>
              h("div",{key:gi,style:{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:"1px solid #1f1f1f"}},
                h("span",{style:{color:"#777",fontFamily:S.mono,fontSize:10,minWidth:90}},l),
                h("span",{style:{color:"#e0e0e0",textAlign:"right",flex:1}},arr.join(", "))
              )),
            ccCh.n>0&&h("div",{key:"corn",style:{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderTop:"1px solid #1f1f1f",marginTop:2}},
              h("span",{style:{color:"#7a7",fontFamily:S.mono,fontSize:10,minWidth:90}},"Supplement"),
              h("span",{style:{color:"#7a7",textAlign:"right",flex:1}},ccCh.n+"× "+CORN_CAKE.name+" ("+Math.round(ccCh.n*CORN_CAKE.kcal*10)/10+")"))
          );
        })(),

        // Order guide (Chopstix, Deliveroo-Schritte)
        (()=>{
          const box=(steps)=>h("div",{style:{background:"#0d0d0d",borderRadius:8,padding:14,border:"1px solid #2a2a2a"}},
            h("div",{style:{fontSize:10,color:S.green,fontFamily:S.mono,textTransform:"uppercase",letterSpacing:2,marginBottom:10,display:"flex",alignItems:"center",gap:6}},
              h("span",{style:{fontSize:13}},"📋")," Order guide (Deliveroo)"),
            ...steps.map((st,i)=>h("div",{key:i,style:{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0",borderBottom:i<steps.length-1?"1px solid #1a1a1a":"none"}},
              h("span",{style:{fontSize:9,color:"#555",fontFamily:S.mono,minWidth:16,textAlign:"right"}},i+1+"."),
              h("span",{style:{fontSize:10,color:"#777",fontFamily:S.mono,minWidth:100}},st.l),
              h("span",{style:{fontSize:12,color:"#e0e0e0",fontWeight:500,fontFamily:S.font}},st.v)
            ))
          );
          return box([
            {l:"Box",v:selCh.box==="large"?"Triple Topper (3 Toppings) / Large Box":"Build a Box (2 Toppings) / Regular"},
            {l:"Base",v:selCh.base.name},
            {l:"Toppings",v:itsuLabel(selCh.tops)},
            ...cornStep(ccCh),
          ]);
        })()
      ),

      // Detail panel (Five Guys, Build Your Own)
      resto==="fiveguys"&&selFG&&h("div",{style:{background:"#151515",borderRadius:12,border:"1px solid "+S.green,padding:16}},
        h("div",{style:{fontSize:15,fontWeight:700,color:"#fff",marginBottom:4}}, selFG.main?selFG.main.name:selFG.fries.name),
        h("div",{style:{fontSize:11,color:"#777",marginBottom:12,fontFamily:S.mono}},
          "Five Guys · build your own"+(selFG.main&&selFG.fries?" · "+selFG.fries.name:"")),

        h("div",{style:{marginBottom:16}},
          h(MacroBar,{label:"Calories",value:ccFG.total.kcal,target:mode==="macros"?autoK:tK,color:"#4ade80",unit:" kcal"}),
          h(MacroBar,{label:"Carbs",value:ccFG.total.carbs,target:mode==="macros"?tC:0,color:"#fbbf24"}),
          h(MacroBar,{label:"Protein",value:ccFG.total.protein,target:mode==="macros"?tP:0,color:"#60a5fa"}),
          h(MacroBar,{label:"Fat",value:ccFG.total.fat,target:mode==="macros"?tF:0,color:"#f87171"}),
          h(MacroBar,{label:"Fibre",value:ccFG.total.fibre,target:fibMin!==""?Number(fibMin):0,color:"#a78bfa"}),
          h(MacroBar,{label:"Salt",value:ccFG.total.salt,target:sMax!==""?Number(sMax):0,color:"#94a3b8"})
        ),
        cornBaseRow(ccFG),

        // Komponenten (Main + Toppings + Fries)
        h("div",{style:{marginBottom:16}},
          h("div",{style:{fontSize:10,color:"#555",fontFamily:S.mono,textTransform:"uppercase",letterSpacing:1,marginBottom:6}},"Components"),
          ...[["Main",selFG.main?[selFG.main.name+" ("+selFG.main.kcal+")"]:[]],
              ["Bun",(selFG.bun==="bowl")?["Bowl — no bun (−"+FIVEGUYS.mods.bun.kcal+")"]:(selFG.bun==="wrap")?["Lettuce Wrap — no bun (−"+Math.round((FIVEGUYS.mods.bun.kcal-FIVEGUYS.mods.lettuce.kcal)*10)/10+")"]:[]],
              ["Extra patties",selFG.extraPatties?[selFG.extraPatties+"× Beef Patty (+"+Math.round(selFG.extraPatties*FIVEGUYS.mods.patty.kcal)+")"]:[]],
              ["Extras",(selFG.extras||[]).map(nm=>nm+" (+"+(nm==="Extra Patty"?FIVEGUYS.mods.patty.kcal:nm==="Cheese"?FIVEGUYS.mods.cheese.kcal:FIVEGUYS.mods.bacon.kcal)+")")],
              ["Toppings",selFG.tops.map(x=>x.name+" ("+x.kcal+")")],
              ["Fries",selFG.fries?[selFG.fries.name+" ("+selFG.fries.kcal+")"]:[]]]
            .filter(([l,arr])=>arr.length).map(([l,arr],gi)=>
            h("div",{key:gi,style:{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:"1px solid #1f1f1f"}},
              h("span",{style:{color:"#777",fontFamily:S.mono,fontSize:10,minWidth:90}},l),
              h("span",{style:{color:"#e0e0e0",textAlign:"right",flex:1}},arr.join(", "))
            )),
          ccFG.n>0&&h("div",{key:"corn",style:{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderTop:"1px solid #1f1f1f",marginTop:2}},
            h("span",{style:{color:"#7a7",fontFamily:S.mono,fontSize:10,minWidth:90}},"Supplement"),
            h("span",{style:{color:"#7a7",textAlign:"right",flex:1}},ccFG.n+"× "+CORN_CAKE.name+" ("+Math.round(ccFG.n*CORN_CAKE.kcal*10)/10+")"))
        ),

        // Order guide (Five Guys, Deliveroo-Schritte)
        (()=>{
          const box=(steps)=>h("div",{style:{background:"#0d0d0d",borderRadius:8,padding:14,border:"1px solid #2a2a2a"}},
            h("div",{style:{fontSize:10,color:S.green,fontFamily:S.mono,textTransform:"uppercase",letterSpacing:2,marginBottom:10,display:"flex",alignItems:"center",gap:6}},
              h("span",{style:{fontSize:13}},"📋")," Order guide (Deliveroo)"),
            ...steps.map((st,i)=>h("div",{key:i,style:{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0",borderBottom:i<steps.length-1?"1px solid #1a1a1a":"none"}},
              h("span",{style:{fontSize:9,color:"#555",fontFamily:S.mono,minWidth:16,textAlign:"right"}},i+1+"."),
              h("span",{style:{fontSize:10,color:"#777",fontFamily:S.mono,minWidth:100}},st.l),
              h("span",{style:{fontSize:12,color:"#e0e0e0",fontWeight:500,fontFamily:S.font}},st.v)
            ))
          );
          const steps=[];
          if(selFG.main){
            const g=selFG.main.group;
            steps.push({l:g==="hotdogs"?"Hot Dog":g==="sandwiches"?"Sandwich":"Burger",v:selFG.main.name});
            if(g==="burgers")steps.push({l:"Bun or Bunless",v:selFG.bun==="bowl"?"Bowl":selFG.bun==="wrap"?"Lettuce Wrap":"Bun"});
            if(g==="burgers"&&selFG.extraPatties)steps.push({l:"Extra Patties",v:selFG.extraPatties===1?"One Extra Patty":"Two Extra Patties"});
            steps.push({l:"Toppings (free)",v:selFG.tops.length?selFG.tops.map(x=>x.name).join(", "):"none"});
            if(g==="sandwiches"&&selFG.extras&&selFG.extras.length)steps.push({l:"Extras",v:selFG.extras.join(", ")});
          }
          if(selFG.fries)steps.push({l:"Fries",v:selFG.fries.name});
          cornStep(ccFG).forEach(s=>steps.push(s));
          return box(steps);
        })()
      ),

      // Footer
      h("div",{style:{marginTop:20,fontSize:9,color:"#444",fontFamily:S.mono,lineHeight:1.5,textAlign:"center"}},
        resto==="search"?"Add own order: search any dish across all 17 restaurants · saved on this device":resto==="accurate"?"Accurate restaurants: Subway · Farmer J · Itsu · Pret · Nando's · Urban Greens · Wagamama · Atis · Fitness Chef · Pepe's · Pizza Express · Wasabi":resto==="all"?"Best picks across all restaurants — all exclude-filters on":resto==="subway"?"Data: Subway UK & ROI Jan 2026":resto==="farmerj"?"Data: farmerj.com · June 2026":resto==="itsu"?"Data: itsu.com · June 2026":resto==="pret"?"Data: pret.co.uk · June 2026":resto==="nandos"?"Data: nandos.co.uk · June 2026":resto==="wagamama"?"Data: wagamama.com · June 2026":resto==="gdk"?"Data: GDK official nutrition table · June 2026":resto==="atis"?"Data: atisfood.com nutrition table · June 2026":resto==="tfc"?"Data: The Fitness Chef nutrition info · June 2026":resto==="chopstix"?"Data: Chopstix Nutritional Table V19 · April 2026":resto==="pepes"?"Data: Pepe's Piri Piri nutritional info · June 2026 (no fibre data)":resto==="fiveguys"?"Data: Five Guys UK nutrition (per-component, composed) · 2026":resto==="pizzaexpress"?"Data: PizzaExpress Nutritional Menu (England/Wales/Scotland) · June 2026":resto==="wasabi"?"Data: Wasabi Nutritional Guide · per-100g scaled · no fibre data":resto==="leon"?"Data: leon.co · all-day menu":resto==="bagelfactory"?"Data: Bagel Factory Full Ingredient List (Issue 20) · per portion · plain bun":"Data: Urban Greens Allergen Guide 2026 · kcal/P/F/C only")
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
